<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity Web Player | JelajahLusi</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <style>
      body {
        background-color: #9fc7d5; 
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        /* Mencegah layar bisa di-scroll agar fokus ke game */
        overflow: hidden; 
      }
      
      /* Pembungkus Utama Game */
      .main-layout {
        width: 100%;
        max-width: 960px;
        height: 100vh; /* Memenuhi tinggi layar */
        margin: 0 auto; 
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Wadah Game */
      #unity-container {
        position: relative !important; 
        top: auto !important;
        left: auto !important;
        transform: none !important;
        
        background-color: #222;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        
        width: 100% !important; 
        height: auto !important;
        aspect-ratio: 16 / 9; 
        max-height: 100vh; /* Jangan sampai melebihi layar */
        overflow: hidden;
      }

      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      /* =========================================
         FITUR PAKSA LANDSCAPE UNTUK HP
         ========================================= */
      #landscape-warning {
        display: none; /* Sembunyikan secara default */
      }

      /* Jika layar mendeteksi orientasi Portrait (Berdiri) */
      @media screen and (orientation: portrait) {
        .main-layout {
          display: none; /* Sembunyikan game */
        }
        #landscape-warning {
          display: flex;
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background-color: #222;
          color: white;
          z-index: 9999;
          align-items: center;
          justify-content: center;
          text-align: center;
          padding: 20px;
          box-sizing: border-box;
          font-size: 20px;
          font-weight: bold;
        }
      }
    </style>
  </head>
  
  <body>
    <div id="landscape-warning">
      <div>
        <p>🔄</p>
        <p>Harap putar HP Anda (Landscape) untuk bermain.</p>
      </div>
    </div>

    <div class="main-layout">
        <div id="unity-container" class="unity-desktop">
          <canvas id="unity-canvas" tabindex="-1"></canvas>
          <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
              <div id="unity-progress-bar-full"></div>
            </div>
          </div>
          <div id="unity-warning"> </div>
          <div id="unity-footer">
            <div id="unity-logo-title-footer"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">JelajahLusi</div>
          </div>
        </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/jelajahlusi.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/jelajahlusi.data",
        frameworkUrl: buildUrl + "/jelajahlusi.framework.js",
        codeUrl: buildUrl + "/jelajahlusi.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "SmaKemalaBhayangkari5",
        productName: "JelajahLusi",
        productVersion: "1.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-desktop";
        canvas.className = "unity-desktop";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "540px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };
      document.body.appendChild(script);
    </script>
  </body>
</html>
