<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | JelajahLusi</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <style>
      /* 1. Pengaturan Background */
      body {
        background-color: #9fc7d5; 
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      
      /* 2. Pembungkus Utama (Agar posisi di tengah layar) */
      .main-layout {
        width: 960px;
        max-width: 95vw;
        margin: 40px auto; /* Membuat kontainer rata tengah secara otomatis */
        display: flex;
        flex-direction: column;
        gap: 40px; /* Jarak aman antara game dan komentar */
      }

      /* 3. KUNCI PERBAIKAN: Mematikan paksa posisi 'absolute' bawaan Unity */
      #unity-container.unity-desktop {
        position: relative !important; 
        top: auto !important;
        left: auto !important;
        transform: none !important;
        
        background-color: #222;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        border-radius: 6px;
        width: 100% !important;
      }

      /* 4. Wadah Komentar */
      #comments-section {
        width: 100%;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        box-sizing: border-box;
      }
    </style>
  </head>
  
  <body>
    <!-- PEMBUNGKUS UTAMA BARU -->
    <div class="main-layout">
        
        <!-- WADAH GAME UNITY -->
        <div id="unity-container" class="unity-desktop">
          <canvas id="unity-canvas" width=960 height=540 tabindex="-1"></canvas>
          <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
              <div id="unity-progress-bar-full"></div>
            </div>
          </div>
          <div id="unity-warning"> </div>
          <div id="unity-footer">
            <div id="unity-logo-title-footer"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">JelajahLusi</div>
          </div>
        </div>

        <!-- FITUR KOMENTAR GISCUS -->
        <div id="comments-section">
            <h3 style="color: #333; margin-bottom: 20px; text-align: center;">Kolom Komentar</h3>
            
            <script src="https://giscus.app/client.js"
                    data-repo="jelajahlusi/jelajahlusi"
                    data-repo-id="R_kgDOTX8pZA"
                    data-category="Announcements"
                    data-category-id="DIC_kwDOTX8pZM4DBKtD"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="light"
                    data-lang="id"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>

    </div>

    <!-- SCRIPT UNITY BUILD -->
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/jelajahlusi.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/jelajahlusi.data",
        frameworkUrl: buildUrl + "/jelajahlusi.framework.js",
        codeUrl: buildUrl + "/jelajahlusi.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "SmaKemalaBhayangkari5",
        productName: "JelajahLusi",
        productVersion: "1.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "540px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };
      document.body.appendChild(script);
    </script>
  </body>
</html>
